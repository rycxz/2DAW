<body>
<script>
/*13. Escribir un programa que nos diga si un número dado es primo (no es divisible por
ninguno otro número que no sea él mismo o la unidad)*/
num = parseInt(prompt("dime el numero "));
contador =0;
for(i = 2 ; i<num ;i++){
    if(num%i===0){
        contador++;
    }
}
if(contador === 0 ){
    alert("el numero "+ num + " es pirmo")
}
else {
    alert("el numero no es primo ")
}
</script>
</body>
