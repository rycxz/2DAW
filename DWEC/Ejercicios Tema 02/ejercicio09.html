<!DOCTYPE html>

<script>


  /*9. Escribe un programa que pida un número y nos diga si es divisible por 2, 3, 5 o 7
  (sólo hay que comprobar si lo es por uno de los cuatro)*/

  num=parseInt(prompt("digame su numero",0));
  if( num%2==0){
    document.write("el numero   es divisble por 2  ")
  }
  else{
    document.write("no es divible por 2 ")
  }

  if( num%3==0){
    document.write("el numero   es divisble por 3 ")
  }
  else{
    document.write("no es divible por 3 ")
  }

  if( num%5==0){
    document.write("el numero   es divisble por 5 ")
  }
  else{
    document.write("no es divible por 5 ")
  }
  if( num%7==0){
    document.write("el numero   es divisble por 7  ")
  }
  else{
    document.write("no es divible por 7 ")
  }


</script>
</body>
</html>
