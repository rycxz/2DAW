<script>
/*. Escribe un programa que pida 3 números y escriba en la pantalla el mayor de los tres.*/

num=parseInt(prompt("digame su numero",0));
num1=parseInt(prompt("digame su numero",0));
num2=parseInt(prompt("digame su numero",0));

if(num>num1 && num>num2){
    document.write("el numero mayor es " + num)
}
else if(num1>num && num1>num2){
    document.write("el numero mayor es " + num1)
}
else if(num2>num1 && num2>num){
    document.write("el numero mayor es " + num2)
}



</script>
