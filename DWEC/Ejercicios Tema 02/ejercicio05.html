<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  /*Escribe un programa que pida una frase y escriba cuantas veces aparece la letra a*/
  cadena = prompt("dime tu cadena");
  contador =0 ;
  for(let i=0;i<cadena.length;i++){
    if(cadena.charAt(i)==='a'){
      contador ++;
    }



  }
  document.write("la cadena tiene " + contador + " la letra a");

</script>
</body>
</html>
