<script>
/*11. Escribir un programa que escriba en pantalla los divisores de un número dado*/
num = parseInt(prompt("dime el numero "));
for(i = 1 ; i<num ;i++){
  if(num%i===0){
    document.write("el numero es divisble por " + i +" . ");
  }


}

</script>
