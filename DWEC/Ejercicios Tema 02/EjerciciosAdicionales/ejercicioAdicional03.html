<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    /*
    Realiza un script que pida por pantalla cadenas de texto o números, hasta que el
    usuario se pulse el botón “cancelar”, entonces se mostrarán todas las cadenas
    concatenadas con un guión -.
    */
    cadena=" ";
    cadenaAux ="";
    do{
        cadena= prompt("dime tu cadena", null);
        if(cadena != null{
            cadenaAux = cadenaAux + "" + cadena;
        }
    }while(cadena != null);
    document.write(cadenaAux);






</script>

</body>
</html>
