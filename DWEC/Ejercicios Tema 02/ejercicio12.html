<script>
    /*12. Escribir un programa que escriba en pantalla los divisores comunes de dos números
dados*/
    num = parseInt(prompt("dime el numero "));
    num1 = parseInt(prompt("dime el numero "));
    for(i = 1 ; i<num ;i++){
        if(num%i===0 &&num1%i===0 ){
            document.write("los numeros tiene de divisores comunes: " + i +" . ");
        }


    }

</script>
